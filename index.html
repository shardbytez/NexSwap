<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NexSwap</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
</head>
<body>
  <div class="header">
    <button id="faucetBtn">💧 Faucet</button>
    <div class="spacer"></div>
    <button id="connectWallet">Connect Wallet</button>
  </div>

  <div class="window">
    <div class="title-bar">NexSwap</div>
    <div class="content">
      <div class="swap-section">
        <label>From:</label>
        <input id="fromAmount" type="number" placeholder="0.0">
        <select id="fromToken">
          <option value="NSW">NSW</option>
          <option value="NST">NST</option>
        </select>

        <div class="swap-arrow">⬇️</div>

        <label>To:</label>
        <input id="toAmount" type="number" placeholder="0.0" disabled>
        <select id="toToken">
          <option value="NST">NST</option>
          <option value="NSW">NSW</option>
        </select>
      </div>

      <div class="fee-info">Protocol Fee: 0.0001 NEX</div>
      <button id="actionButton">Approve NSW</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
