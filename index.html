<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NexSwap</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="window">
    <div class="title-bar">
      <span>NexSwap</span>
      <div class="right-controls">
        <button id="faucetBtn">💧 Faucet</button>
        <button id="connectWallet">Connect Wallet</button>
      </div>
    </div>

    <div class="content">
      <div class="swap-box">
        <select id="fromToken">
          <option value="NSW">NSW</option>
          <option value="NST">NST</option>
        </select>
        <input id="fromAmount" type="number" placeholder="Enter amount">
        <select id="toToken">
          <option value="NST">NST</option>
          <option value="NSW">NSW</option>
        </select>
      </div>

      <button id="actionButton">Approve</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
